# Build standalone FinAnalyzer desktop binaries (Node SEA) for Windows and
# macOS. Each runner builds on its own OS because a SEA embeds that platform's
# Node runtime and the native better-sqlite3 addon — they can't be cross-built.
#
# Triggers:
#   • push to the active dev branch — builds + publishes a rolling release
#     (tag v1.0.0-desktop) so there's always a fresh download link.
#   • push a tag like v1.0.0 — publishes a release at that tag.
#   • manual run from the Actions tab.
#
# Output per target = a folder you send to end users:
#   FinAnalyzer.exe (or FinAnalyzer) + app/ (dist + backend + runtime deps).
# Download it from the GitHub Release, or the run's "Artifacts" section.

name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - claude/quirky-turing-G3Yak
    tags:
      - 'v*'

permissions:
  contents: write        # the release job creates a tag + release via the token

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
          - os: macos-13          # Intel
            label: macos-x64
          - os: macos-14          # Apple Silicon
            label: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install build dependencies
        run: npm ci --no-audit --no-fund

      - name: Build SEA binary
        run: node sea/build-sea.cjs

      - name: Package output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path sea/out/FinAnalyzer/* -DestinationPath FinAnalyzer-${{ matrix.label }}.zip

      - name: Package output (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent sea/out/FinAnalyzer FinAnalyzer-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinAnalyzer-${{ matrix.label }}
          path: app/FinAnalyzer-${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # always() so a single-platform build failure still publishes the
    # binaries that did succeed (the user can test those immediately).
    if: ${{ always() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v1.0.0-desktop"
          fi
          if ! ls artifacts/*.zip >/dev/null 2>&1; then
            echo "No binaries were produced by any build job — nothing to publish."
            exit 1
          fi
          echo "Publishing release $TAG with assets:"
          ls -la artifacts
          # Recreate the rolling release so assets always match the latest build.
          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create "$TAG" artifacts/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "FinAnalyzer Desktop ($TAG)" \
            --notes "Standalone desktop builds — no Node install required.

          | Platform | Download |
          |---|---|
          | Windows 10/11 (x64) | FinAnalyzer-windows-x64.zip |
          | macOS Apple Silicon | FinAnalyzer-macos-arm64.zip |
          | macOS Intel | FinAnalyzer-macos-x64.zip |

          Unzip the folder and run **FinAnalyzer.exe** (Windows) or **Run FinAnalyzer.command** (macOS). Keep the \`app/\` folder next to the executable. The app opens at http://127.0.0.1:5173."
